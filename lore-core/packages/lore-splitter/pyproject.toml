[project]
name = "lore-splitter"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "lore-core-domain",
    "defusedxml==0.7.1",
    "markitdown[docx,pptx,pdf]==0.1.6",
    "openpyxl==3.1.5",
    "Pillow==12.3.0",
    "pymupdf==1.28.0",
    "python-docx==1.2.0",
    "python-pptx==1.0.2",
    "psycopg[binary,pool]==3.3.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lore_splitter"]
