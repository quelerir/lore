[project]
name = "lore-retrieval"
version = "0.0.1"
description = "Lore hybrid graph-RAG retrieval (Neo4j projection + LangGraph orchestration)"
requires-python = ">=3.13"
dependencies = [
    "neo4j>=5.28,<6",
    "neo4j-graphrag>=1.3,<2",
    "langchain-ollama>=0.2",
    "asyncpg>=0.30",
    "pydantic>=2.9",
    "pydantic-settings>=2.6",
    "pyyaml>=6.0",
    "httpx>=0.27",
]

[dependency-groups]
dev = ["pytest>=8.0", "pytest-asyncio>=0.24", "ruff>=0.15", "mypy>=1.13", "hypothesis>=6.0"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
asyncio_mode = "auto"

[tool.mypy]
python_version = "3.13"
mypy_path = "src"
packages = ["lore_retrieval"]
ignore_missing_imports = true       # neo4j / asyncpg / langchain / httpx stubs absent
check_untyped_defs = true
warn_redundant_casts = true
warn_unused_ignores = true
no_implicit_optional = true

[tool.setuptools.packages.find]
where = ["src"]
