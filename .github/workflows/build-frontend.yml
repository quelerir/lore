name: Docker Build and Push (frontend)

on:
  push:
    tags:
      - '*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Docker CLI
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DEPLOYCRAFT_DOCKER_HOST }}
          username: ${{ env.DEPLOYCRAFT_DOCKER_USER }}
          password: ${{ env.DEPLOYCRAFT_DOCKER_PASSWORD }}
      - name: Build and push Docker images
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: cr.selcloud.ru/adventum/lore-frontend:${{github.ref_name}}
          context: ./frontend
          # VITE_* is inlined into the SPA at BUILD time, so the public chat URL
          # must be baked here. Set the CHAINLIT_PUBLIC_URL Actions variable to
          # the same value used in .env.prod (repo/org → Settings → Variables).
          build-args: |
            VITE_CHAINLIT_URL=${{ vars.CHAINLIT_PUBLIC_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
