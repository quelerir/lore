<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lore · File Viewer</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef1f5;
      --surface: #ffffff;
      --surface-soft: #f7f9fc;
      --surface-blue: #edf3ff;
      --border: #dce2ea;
      --border-strong: #cbd4e0;
      --text: #19212e;
      --muted: #687386;
      --faint: #8f99a9;
      --primary: #315fc7;
      --primary-hover: #254ca6;
      --primary-soft: #e7eeff;
      --success: #25754a;
      --success-soft: #e7f5ed;
      --warning: #986800;
      --warning-soft: #fff5d9;
      --danger: #b33a42;
      --danger-soft: #fcebed;
      --purple: #7652b5;
      --purple-soft: #f0eafb;
      --shadow: 0 10px 28px rgba(29, 43, 69, .08);
      --radius: 10px;
      --font: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --mono: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      overflow: hidden;
      color: var(--text);
      background: var(--bg);
      font-family: var(--font);
      font-size: 14px;
    }

    button, input, select, textarea { font: inherit; }
    button { color: inherit; }
    button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
      outline: 3px solid rgba(49, 95, 199, .24);
      outline-offset: 1px;
    }

    .topbar {
      height: 56px;
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 0 18px;
      color: #fff;
      background: #222936;
      border-bottom: 1px solid #171c25;
    }
    .brand { display: flex; align-items: center; gap: 11px; min-width: 220px; }
    .brand-mark {
      width: 31px;
      height: 31px;
      display: grid;
      place-items: center;
      border-radius: 9px;
      color: #fff;
      background: linear-gradient(145deg, #7399ff, #315fc7);
      box-shadow: inset 0 1px rgba(255,255,255,.28);
      font-weight: 800;
    }
    .brand strong { display: block; letter-spacing: -.01em; }
    .brand span { display: block; margin-top: 1px; color: #aeb7c7; font-size: 11px; }
    .top-nav { display: flex; align-items: center; gap: 4px; }
    .top-nav button {
      border: 0;
      padding: 8px 11px;
      border-radius: 7px;
      color: #c5ccda;
      background: transparent;
      cursor: pointer;
    }
    .top-nav button.active { color: #fff; background: rgba(255,255,255,.1); }
    .top-actions { margin-left: auto; display: flex; align-items: center; gap: 9px; }
    .environment {
      padding: 5px 9px;
      border: 1px solid #4c5668;
      border-radius: 999px;
      color: #c9d0dd;
      font-size: 11px;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-height: 32px;
      padding: 6px 10px;
      border: 1px solid var(--border-strong);
      border-radius: 7px;
      color: var(--text);
      background: var(--surface);
      cursor: pointer;
      transition: background .15s ease, border-color .15s ease, transform .15s ease;
    }
    .btn:hover { background: var(--surface-soft); border-color: #b8c3d2; }
    .btn:active { transform: translateY(1px); }
    .btn.primary { color: #fff; border-color: var(--primary); background: var(--primary); }
    .btn.primary:hover { background: var(--primary-hover); }
    .btn.ghost-dark { color: #d7dce6; border-color: #4d5666; background: transparent; }
    .btn.ghost-dark:hover { background: rgba(255,255,255,.08); }
    .btn.danger { color: var(--danger); border-color: #efc8cc; background: var(--danger-soft); }
    .btn.icon { width: 32px; padding: 0; }
    .btn.small { min-height: 27px; padding: 4px 8px; font-size: 12px; }

    .workspace {
      height: calc(100vh - 56px);
      display: grid;
      grid-template-columns: minmax(250px, 27%) minmax(370px, 39%) minmax(420px, 34%);
      background: var(--border);
      gap: 1px;
    }
    .panel { min-width: 0; overflow: hidden; background: var(--surface); }
    .panel-head {
      min-height: 56px;
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 11px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .panel-head h2, .panel-head h3 { margin: 0; font-size: 14px; }
    .count { color: var(--faint); font-size: 12px; }
    .head-spacer { margin-left: auto; }
    .scroll { height: calc(100% - 56px); overflow: auto; }
    .section-label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 750;
      letter-spacing: .055em;
      text-transform: uppercase;
    }
    .muted { color: var(--muted); }
    .mono { font-family: var(--mono); }

    .files-tools { padding: 12px; border-bottom: 1px solid var(--border); background: var(--surface-soft); }
    .search {
      width: 100%;
      height: 36px;
      padding: 0 11px 0 34px;
      border: 1px solid var(--border-strong);
      border-radius: 8px;
      color: var(--text);
      background: var(--surface) linear-gradient(90deg, transparent 31px, var(--border) 31px, var(--border) 32px, transparent 32px);
    }
    .search-wrap { position: relative; }
    .search-wrap::before { content: "⌕"; position: absolute; left: 11px; top: 7px; color: var(--muted); font-size: 18px; }
    .filter-row { display: flex; gap: 6px; margin-top: 8px; overflow-x: auto; padding-bottom: 1px; }
    .chip {
      flex: 0 0 auto;
      padding: 5px 8px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      background: var(--surface);
      font-size: 11px;
      cursor: pointer;
    }
    .chip.active { color: var(--primary); border-color: #b8c9f3; background: var(--primary-soft); }
    .files-list { height: calc(100% - 105px); overflow: auto; padding: 6px; }
    .file-card {
      width: 100%;
      display: block;
      padding: 11px;
      border: 1px solid transparent;
      border-radius: 8px;
      text-align: left;
      background: transparent;
      cursor: pointer;
      transition: .15s ease;
    }
    .file-card:hover { background: var(--surface-soft); }
    .file-card.active { border-color: #bfd0f3; background: var(--surface-blue); box-shadow: inset 3px 0 var(--primary); }
    .file-title-row { display: flex; align-items: flex-start; gap: 8px; }
    .file-icon {
      width: 29px;
      height: 32px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--primary);
      background: #fff;
      font-size: 10px;
      font-weight: 800;
    }
    .file-name { min-width: 0; font-size: 13px; font-weight: 680; line-height: 1.25; overflow-wrap: anywhere; }
    .file-sub { margin-top: 3px; color: var(--muted); font-size: 11px; }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 6px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 720;
      letter-spacing: .02em;
      text-transform: uppercase;
    }
    .status::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .status.success { color: var(--success); background: var(--success-soft); }
    .status.active { color: var(--primary); background: var(--primary-soft); }
    .status.failed { color: var(--danger); background: var(--danger-soft); }
    .status.skipped { color: #6e7480; background: #edf0f4; }
    .file-metrics { display: flex; flex-wrap: wrap; gap: 9px; margin-top: 9px; color: var(--muted); font-size: 11px; }
    .file-metrics .problem { color: var(--danger); font-weight: 650; }

    .file-header { padding: 14px 16px; border-bottom: 1px solid var(--border); background: var(--surface); }
    .file-heading { display: flex; align-items: flex-start; gap: 9px; }
    .file-heading h1 { margin: 0; font-size: 16px; line-height: 1.35; overflow-wrap: anywhere; }
    .file-heading .status { margin-left: auto; }
    .file-path { margin-top: 4px; color: var(--muted); font-family: var(--mono); font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .run-row { display: flex; align-items: center; flex-wrap: wrap; gap: 7px; margin-top: 11px; }
    .run-select { height: 32px; max-width: 175px; border: 1px solid var(--border-strong); border-radius: 7px; background: #fff; padding: 0 8px; font-size: 12px; }
    .summary-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; margin-top: 12px; }
    .summary-item { padding: 7px 8px; border: 1px solid var(--border); border-radius: 7px; background: var(--surface-soft); }
    .summary-item strong { display: block; font-size: 13px; }
    .summary-item span { color: var(--muted); font-size: 10px; }
    .banner {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      margin: 10px 12px 0;
      padding: 9px 10px;
      border: 1px solid #ead28f;
      border-radius: 8px;
      color: #74510a;
      background: var(--warning-soft);
      font-size: 11px;
      line-height: 1.4;
    }
    .banner strong { display: block; font-size: 11px; }
    .chunk-tools { display: flex; align-items: center; gap: 7px; padding: 10px 12px; border-bottom: 1px solid var(--border); background: var(--surface-soft); }
    .document-search { width: min(250px, 52%); height: 30px; padding: 0 9px; border: 1px solid var(--border); border-radius: 7px; background: #fff; font-size: 11px; }
    .keyboard-hint { margin-left: auto; color: var(--faint); font-size: 10px; }
    kbd { padding: 1px 4px; border: 1px solid var(--border-strong); border-bottom-width: 2px; border-radius: 4px; background: #fff; font-family: var(--mono); font-size: 9px; }
    .continuous-document { height: calc(100% - 257px); overflow: auto; padding: 18px 24px 56px; scroll-behavior: smooth; background: #fff; }
    .document-page { max-width: 760px; margin: 0 auto; }
    .document-section {
      position: relative;
      margin: 0;
      padding: 18px 10px 20px 16px;
      border: 0;
      border-top: 1px solid #edf0f4;
      text-align: left;
      background: transparent;
      cursor: pointer;
      transition: .15s ease;
    }
    .document-section:first-child { border-top: 0; padding-top: 8px; }
    .document-section:hover { background: #fafbfe; }
    .document-section.active { background: linear-gradient(90deg, #f1f5ff, #fff 72%); box-shadow: inset 3px 0 var(--primary); }
    .document-section.warning { box-shadow: inset 3px 0 #d39415; }
    .document-section.active.warning { box-shadow: inset 3px 0 var(--primary); }
    .document-section.boundaries-hidden { border-top-color: transparent; padding-top: 11px; padding-bottom: 13px; }
    .document-section.boundaries-hidden .document-section-marker { opacity: 0; height: 0; margin: 0; overflow: hidden; }
    .document-section-marker { display: flex; align-items: center; gap: 7px; height: 18px; margin: 0 0 7px; color: var(--faint); font-size: 9px; transition: .15s ease; }
    .document-section-marker .ordinal { font-size: 10px; }
    .document-section .prose { font-size: 12px; line-height: 1.58; }
    .document-section .prose h2 { margin-top: .25em; font-size: 17px; }
    .document-section .prose h3 { margin-top: .25em; font-size: 14px; }
    .document-section .prose p:last-child { margin-bottom: 0; }
    .inline-payload { margin: 14px 0 2px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; background: #fff; box-shadow: 0 3px 12px rgba(31,45,68,.05); }
    .inline-payload-title { display: flex; align-items: center; gap: 7px; padding: 8px 10px; border-bottom: 1px solid var(--border); background: var(--surface-soft); font-size: 10px; }
    .inline-table-preview { max-height: 230px; overflow: auto; }
    .inline-table-preview table { font-size: 10px; }
    .inline-image-preview { padding: 10px; }
    .inline-image-preview .image-preview { height: 210px; }
    .inline-caption { display: flex; align-items: center; gap: 8px; padding: 8px 10px; color: var(--muted); font-size: 9px; }
    .chunk-top { display: flex; align-items: center; gap: 6px; }
    .ordinal { color: var(--primary); font-family: var(--mono); font-weight: 720; }
    .type-tag { padding: 2px 5px; border-radius: 4px; color: #536076; background: #edf0f4; font-size: 9px; text-transform: uppercase; }
    .review-dot { margin-left: auto; color: var(--success); font-size: 11px; font-weight: 700; }
    .chunk-preview { margin: 7px 0; color: #374254; font-size: 12px; line-height: 1.42; display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2; overflow: hidden; }
    .chunk-meta { display: flex; align-items: center; flex-wrap: wrap; gap: 7px; color: var(--muted); font-size: 10px; }
    .payload-tag { padding: 2px 5px; border-radius: 4px; color: var(--purple); background: var(--purple-soft); }
    .finding-tag { padding: 2px 5px; border-radius: 4px; color: var(--warning); background: var(--warning-soft); }

    .inspector-head { min-height: 96px; display: flex; flex-direction: column; align-items: stretch; gap: 10px; padding: 12px 14px 0; }
    .inspector-title-row { display: flex; align-items: flex-start; gap: 10px; }
    .inspector-title-row h2 { margin: 0; font-size: 14px; }
    .inspector-title-row p { margin: 3px 0 0; color: var(--muted); font-size: 10px; font-family: var(--mono); }
    .tabs { display: flex; gap: 2px; overflow-x: auto; }
    .tab {
      padding: 8px 9px;
      border: 0;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      background: transparent;
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 700; }
    .inspector-toolbar {
      height: 43px;
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface-soft);
    }
    .segmented { display: inline-flex; padding: 2px; border: 1px solid var(--border); border-radius: 7px; background: #fff; }
    .segmented button { min-height: 24px; padding: 3px 7px; border: 0; border-radius: 5px; color: var(--muted); background: transparent; font-size: 10px; cursor: pointer; }
    .segmented button.active { color: var(--primary); background: var(--primary-soft); font-weight: 700; }
    .inspector-scroll { height: calc(100% - 139px); overflow: auto; }
    .inspector-content { padding: 18px; }
    .breadcrumbs { margin-bottom: 13px; color: var(--muted); font-size: 10px; }
    .prose { font-size: 13px; line-height: 1.65; }
    .prose h1, .prose h2, .prose h3 { margin: 1.3em 0 .5em; color: #1d2837; line-height: 1.25; }
    .prose h2 { font-size: 17px; }
    .prose h3 { font-size: 14px; }
    .prose p { margin: .7em 0; }
    .prose blockquote { margin: 12px 0; padding: 8px 12px; border-left: 3px solid #9bb2e4; color: #46546a; background: var(--surface-blue); }
    .raw-text { margin: 0; white-space: pre-wrap; overflow-wrap: anywhere; font: 11px/1.6 var(--mono); color: #31405a; }
    .detail-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin-top: 17px; }
    .detail { padding: 9px; border: 1px solid var(--border); border-radius: 7px; background: var(--surface-soft); }
    .detail span { display: block; color: var(--muted); font-size: 9px; text-transform: uppercase; letter-spacing: .05em; }
    .detail strong { display: block; margin-top: 4px; overflow-wrap: anywhere; font: 10px/1.35 var(--mono); }
    .quote-action { margin-top: 18px; padding: 10px; border: 1px dashed #b9c6d9; border-radius: 8px; color: var(--muted); background: #fafcff; font-size: 11px; }

    .payload-card { margin-bottom: 12px; border: 1px solid var(--border); border-radius: 9px; overflow: hidden; }
    .payload-card-head { display: flex; align-items: center; gap: 8px; padding: 10px 12px; background: var(--surface-soft); border-bottom: 1px solid var(--border); }
    .payload-card-head strong { font-size: 12px; }
    .payload-card-body { padding: 12px; }
    .payload-summary { margin: 0 0 11px; color: #445064; font-size: 12px; line-height: 1.5; }
    .table-wrap { overflow: auto; border: 1px solid var(--border); border-radius: 7px; }
    table { width: 100%; border-collapse: collapse; white-space: nowrap; font-size: 10px; }
    th, td { padding: 7px 8px; border-bottom: 1px solid var(--border); text-align: left; }
    th { position: sticky; top: 0; color: #4b5769; background: #f3f5f8; cursor: pointer; }
    tbody tr:last-child td { border-bottom: 0; }
    tbody tr:hover { background: #f8faff; }
    .null { color: var(--faint); font-family: var(--mono); font-style: italic; }
    .image-preview {
      height: 170px;
      position: relative;
      overflow: hidden;
      display: grid;
      place-items: center;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: linear-gradient(150deg, #dce7ff 0 45%, #edf2ff 45% 56%, #c9daf6 56%);
    }
    .image-preview::before { content: ""; position: absolute; width: 150px; height: 150px; left: 8%; bottom: -82px; border-radius: 50%; background: #91b0dc; box-shadow: 108px -25px 0 23px #7599c9; }
    .image-preview::after { content: ""; position: absolute; width: 28px; height: 28px; right: 18%; top: 20%; border-radius: 50%; background: #f2c96c; }
    .image-preview span { z-index: 1; padding: 5px 8px; border-radius: 6px; color: #fff; background: rgba(35,48,70,.68); font-size: 10px; }
    .image-preview.unavailable { background: repeating-linear-gradient(135deg,#f3f4f6,#f3f4f6 10px,#e8ebef 10px,#e8ebef 20px); }
    .image-preview.unavailable::before, .image-preview.unavailable::after { display: none; }

    .diagnostic { display: flex; gap: 9px; margin-bottom: 8px; padding: 10px; border: 1px solid var(--border); border-radius: 8px; }
    .diagnostic.warning { border-color: #e8d69e; background: #fffaf0; }
    .diagnostic.info { background: #f7f9fc; }
    .diagnostic strong { display: block; font-size: 11px; }
    .diagnostic p { margin: 4px 0 0; color: var(--muted); font-size: 10px; line-height: 1.45; }
    .diagnostic code { color: var(--primary); font-family: var(--mono); }
    .diff-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; border: 1px solid var(--border); background: var(--border); border-radius: 8px; overflow: hidden; }
    .diff-pane { min-width: 0; padding: 12px; background: #fff; }
    .diff-pane h4 { margin: 0 0 9px; color: var(--muted); font-size: 10px; text-transform: uppercase; }
    .diff-pane pre { margin: 0; white-space: pre-wrap; font: 10px/1.6 var(--mono); }
    mark.del { color: #8e3037; background: #fde3e5; text-decoration: line-through; }
    mark.add { color: #17633c; background: #dff3e8; }

    .review-drawer {
      width: min(420px, 95vw);
      position: fixed;
      z-index: 30;
      top: 56px;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--border-strong);
      background: #fff;
      box-shadow: -18px 0 42px rgba(26,39,60,.16);
      transform: translateX(102%);
      transition: transform .2s ease;
    }
    .review-drawer.open { transform: translateX(0); }
    .drawer-head { display: flex; align-items: center; gap: 8px; padding: 13px 15px; border-bottom: 1px solid var(--border); }
    .drawer-head h2 { margin: 0; font-size: 15px; }
    .drawer-body { flex: 1; overflow: auto; padding: 14px; }
    .review-form { padding: 12px; border: 1px solid var(--border); border-radius: 9px; background: var(--surface-soft); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    label { display: block; color: var(--muted); font-size: 10px; font-weight: 700; }
    label select, label input, label textarea { width: 100%; margin-top: 5px; border: 1px solid var(--border-strong); border-radius: 7px; background: #fff; color: var(--text); }
    label select, label input { height: 34px; padding: 0 8px; }
    label textarea { min-height: 76px; padding: 8px; resize: vertical; }
    .full-row { margin-top: 9px; }
    .form-actions { display: flex; justify-content: flex-end; gap: 7px; margin-top: 10px; }
    .review-list { margin-top: 16px; }
    .review-item { margin-bottom: 8px; padding: 10px; border: 1px solid var(--border); border-radius: 8px; background: #fff; }
    .review-item.reviewed { opacity: .67; background: var(--surface-soft); }
    .review-top { display: flex; align-items: center; gap: 7px; }
    .verdict { padding: 3px 6px; border-radius: 5px; font-size: 9px; font-weight: 800; text-transform: uppercase; }
    .verdict.ok { color: var(--success); background: var(--success-soft); }
    .verdict.problem { color: var(--danger); background: var(--danger-soft); }
    .verdict.question { color: var(--warning); background: var(--warning-soft); }
    .provenance { color: var(--purple); font-size: 9px; font-weight: 700; text-transform: uppercase; }
    .review-item p { margin: 8px 0; font-size: 11px; line-height: 1.45; }
    .review-item blockquote { margin: 7px 0; padding-left: 8px; border-left: 2px solid #b9c7dd; color: var(--muted); font-size: 10px; }
    .review-meta { color: var(--faint); font: 9px var(--mono); }
    .review-actions { display: flex; gap: 5px; margin-top: 9px; }
    .empty { padding: 32px 18px; color: var(--muted); text-align: center; }
    .empty strong { display: block; margin-bottom: 5px; color: #4d596d; }

    .toast {
      min-width: 250px;
      position: fixed;
      z-index: 50;
      left: 50%;
      bottom: 24px;
      padding: 10px 13px;
      border-radius: 8px;
      color: #fff;
      background: #222936;
      box-shadow: var(--shadow);
      text-align: center;
      transform: translate(-50%, 90px);
      opacity: 0;
      pointer-events: none;
      transition: .2s ease;
    }
    .toast.show { transform: translate(-50%, 0); opacity: 1; }
    .mobile-nav { display: none; }
    .mobile-hidden { display: block; }

    @media (max-width: 1100px) {
      .workspace { grid-template-columns: 230px minmax(350px, 41%) minmax(390px, 1fr); }
      .top-nav { display: none; }
      .summary-strip { grid-template-columns: repeat(2, 1fr); }
      .continuous-document { height: calc(100% - 306px); padding-inline: 15px; }
    }

    @media (max-width: 760px) {
      body { overflow: auto; }
      .topbar { height: 52px; padding: 0 10px; }
      .brand { min-width: 0; }
      .brand span, .environment { display: none; }
      .workspace { height: calc(100vh - 96px); display: block; }
      .panel { height: 100%; display: none; }
      .panel.mobile-active { display: block; }
      .mobile-nav { height: 44px; display: grid; grid-template-columns: repeat(3, 1fr); border-bottom: 1px solid var(--border); background: #fff; }
      .mobile-nav button { border: 0; border-right: 1px solid var(--border); color: var(--muted); background: #fff; }
      .mobile-nav button.active { color: var(--primary); background: var(--primary-soft); font-weight: 700; }
      .detail-grid, .diff-grid { grid-template-columns: 1fr; }
      .top-actions .btn:not(.reviews-button) { display: none; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">L</div>
      <div><strong>Lore</strong><span>File inspection</span></div>
    </div>
    <nav class="top-nav" aria-label="Основная навигация">
      <button type="button">Чат</button>
      <button type="button" class="active">Файлы</button>
      <button type="button">Источники</button>
    </nav>
    <div class="top-actions">
      <span class="environment">internal · read only</span>
      <button class="btn ghost-dark" id="degraded-toggle" type="button" onclick="toggleDegraded()">◐ Degraded demo</button>
      <button class="btn ghost-dark reviews-button" type="button" onclick="toggleReviewDrawer(true)">☰ Ревью <span id="review-count-top">0</span></button>
    </div>
  </header>

  <nav class="mobile-nav" aria-label="Панели инспектора">
    <button type="button" class="active" data-mobile-panel="files-panel">Файлы</button>
    <button type="button" data-mobile-panel="chunks-panel">Чанки</button>
    <button type="button" data-mobile-panel="inspector-panel">Инспектор</button>
  </nav>

  <main class="workspace" aria-label="Инспектор файлов">
    <aside class="panel files-panel mobile-active" aria-label="Файлы">
      <div class="panel-head">
        <h2>Файлы</h2>
        <span class="count" id="files-count">4</span>
        <button class="btn icon small head-spacer" type="button" title="Обновить" onclick="showToast('Список обновлён · демонстрационные данные')">↻</button>
      </div>
      <div class="scroll">
        <div class="files-tools">
          <div class="search-wrap"><input id="file-search" class="search" type="search" placeholder="Название или тип файла" aria-label="Поиск файлов"></div>
          <div class="filter-row" aria-label="Фильтры статуса">
            <button class="chip active" type="button" data-status-filter="all">Все</button>
            <button class="chip" type="button" data-status-filter="success">Успешные</button>
            <button class="chip" type="button" data-status-filter="problem">С проблемами</button>
            <button class="chip" type="button" data-status-filter="comments">С ревью</button>
          </div>
        </div>
        <div class="files-list" id="files-list"></div>
      </div>
    </aside>

    <section class="panel chunks-panel" aria-label="Структура файла">
      <div id="file-header" class="file-header"></div>
      <div id="degraded-banner"></div>
      <div class="chunk-tools">
        <span class="section-label">Документ</span>
        <input class="document-search" id="document-search" type="search" placeholder="Найти в документе" aria-label="Поиск в документе">
        <button class="btn small" id="boundary-toggle" type="button" onclick="toggleBoundaries()">Границы: тонкие</button>
        <span class="keyboard-hint"><kbd>J</kbd>/<kbd>K</kbd> навигация</span>
      </div>
      <div class="continuous-document" id="continuous-document"><div class="document-page" id="chunks-list"></div></div>
    </section>

    <section class="panel inspector-panel" aria-label="Инспектор чанка">
      <div class="inspector-head">
        <div class="inspector-title-row">
          <div>
            <h2 id="inspector-title">Чанк</h2>
            <p id="inspector-coordinates"></p>
          </div>
          <button class="btn small head-spacer" type="button" onclick="prefillQuote()">＋ Комментарий</button>
        </div>
        <div class="tabs" role="tablist" aria-label="Данные чанка" id="tabs"></div>
      </div>
      <div class="inspector-toolbar">
        <div class="segmented" aria-label="Режим текста">
          <button type="button" class="active" data-text-mode="rendered">Rendered</button>
          <button type="button" data-text-mode="raw">Raw</button>
        </div>
        <button class="btn small" type="button" id="diff-button" onclick="toggleDiff()">⇄ Diff</button>
        <button class="btn small" type="button" onclick="copyCurrentText()">⧉ Copy</button>
        <span class="count head-spacer" id="text-stats"></span>
      </div>
      <div class="inspector-scroll"><div class="inspector-content" id="inspector-content"></div></div>
    </section>
  </main>

  <aside class="review-drawer" id="review-drawer" aria-label="Локальные комментарии" aria-hidden="true">
    <div class="drawer-head">
      <h2>Локальное ревью</h2>
      <span class="count" id="review-count-drawer">0 записей</span>
      <button class="btn icon small head-spacer" type="button" aria-label="Закрыть" onclick="toggleReviewDrawer(false)">×</button>
    </div>
    <div class="drawer-body">
      <div class="review-form">
        <div class="form-row">
          <label>Вердикт
            <select id="review-verdict"><option value="problem">Проблема</option><option value="question">Вопрос</option><option value="ok">OK</option></select>
          </label>
          <label>Категория
            <select id="review-category"><option>Граница чанка</option><option>Потеря контекста</option><option>Структура / заголовок</option><option>Vectortext</option><option>Таблица</option><option>Изображение</option><option>Диагностика</option><option>Другое</option></select>
          </label>
        </div>
        <label class="full-row">Цитата
          <input id="review-quote" type="text" placeholder="Выделенный или выбранный фрагмент">
        </label>
        <label class="full-row">Комментарий
          <textarea id="review-comment" placeholder="Что нужно проверить или исправить?"></textarea>
        </label>
        <div class="form-actions">
          <button class="btn small" type="button" onclick="importAgentFinding()">Импорт AI finding</button>
          <button class="btn primary small" type="button" onclick="addReview()">Сохранить</button>
        </div>
      </div>
      <div class="review-list">
        <div style="display:flex;align-items:center;gap:7px">
          <span class="section-label">Все комментарии</span>
          <button class="btn small head-spacer" type="button" onclick="exportReviews()">Экспорт JSON</button>
          <button class="btn danger small" type="button" onclick="clearReviews()">Очистить</button>
        </div>
        <div id="review-items"></div>
      </div>
    </div>
  </aside>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const files = [
      {
        id: 'policy-remote-work', name: 'Политика удалённой работы.docx', type: 'DOCX', status: 'success',
        updated: '15 июля · 07:12', pipeline: 'documents/v3', chunks: 4, payloads: 2, diagnostics: 2,
        path: 'hr/regulations/Политика удалённой работы.docx', run: 'run_9f7a2d1c', sourceState: 'match',
        runs: ['run_9f7a2d1c · current', 'run_7c18ac04 · 14 июля'], findings: 1
      },
      {
        id: 'quarterly-plan', name: 'План найма Q3.xlsx', type: 'XLSX', status: 'success',
        updated: '15 июля · 06:48', pipeline: 'workbooks/v2', chunks: 12, payloads: 4, diagnostics: 0,
        path: 'hr/plans/План найма Q3.xlsx', run: 'run_26e4cc18', sourceState: 'match',
        runs: ['run_26e4cc18 · current'], findings: 0
      },
      {
        id: 'townhall', name: 'Town Hall — июль.mp4.txt', type: 'TXT', status: 'active',
        updated: '15 июля · 07:23', pipeline: 'transcripts/v1', chunks: 0, payloads: 0, diagnostics: 1,
        path: 'meetings/2026-07-townhall.txt', run: 'run_001e8a33', sourceState: 'match',
        runs: ['run_001e8a33 · active'], findings: 0
      },
      {
        id: 'benefits', name: 'Льготы и компенсации.pdf', type: 'PDF', status: 'failed',
        updated: '15 июля · 05:02', pipeline: 'documents/v3', chunks: 0, payloads: 0, diagnostics: 3,
        path: 'hr/regulations/Льготы и компенсации.pdf', run: 'run_d8c370af', sourceState: 'unavailable',
        runs: ['run_d8c370af · failed', 'run_ae006f1a · skipped'], findings: 2
      }
    ];

    const chunksByFile = {
      'policy-remote-work': [
        {
          id: 'chunk_001', ordinal: 1, type: 'section', coordinates: 'page 1 · heading 1', tokens: 184,
          breadcrumb: 'Политика удалённой работы › 1. Общие положения', finding: false, payloads: [],
          display: '## 1. Общие положения\n\nНастоящая политика определяет порядок удалённой работы сотрудников компании. Она применяется к сотрудникам, чьи должностные обязанности допускают выполнение задач вне офиса.',
          fulltext: '1. Общие положения\n\nНастоящая политика определяет порядок удалённой работы сотрудников компании. Она применяется к сотрудникам, чьи должностные обязанности допускают выполнение задач вне офиса.',
          vector: 'Политика регулирует удалённую работу сотрудников компании и применяется к должностям, обязанности которых можно выполнять вне офиса.',
          hash: 'sha256:2d9bc7a8…c410', signature: 'sig:general-terms:41a8'
        },
        {
          id: 'chunk_002', ordinal: 2, type: 'section', coordinates: 'page 2 · heading 2 · ¶ 1–4', tokens: 347,
          breadcrumb: 'Политика удалённой работы › 2. Условия › 2.1. Рабочее место', finding: true, payloads: [],
          display: '### 2.1. Требования к рабочему месту\n\nСотрудник самостоятельно организует безопасное рабочее место и обеспечивает устойчивое подключение к корпоративным ресурсам.\n\n> Доступ к внутренним системам осуществляется только через корпоративный VPN.',
          fulltext: '2.1. Требования к рабочему месту\n\nСотрудник самостоятельно организует безопасное рабочее место и обеспечивает устойчивое подключение к корпоративным ресурсам. Доступ к внутренним системам осуществляется только через корпоративный VPN. Ответственность за сохранность оборудования определяется актом передачи.',
          vector: 'Сотрудник на удалённой работе самостоятельно обеспечивает безопасное рабочее место, стабильное подключение и использует корпоративный VPN для внутренних систем. Ответственность за оборудование фиксируется актом передачи.',
          hash: 'sha256:c87f9ef1…10bd', signature: 'sig:workplace:70b1'
        },
        {
          id: 'chunk_003', ordinal: 3, type: 'table_context', coordinates: 'page 3 · table 1 · rows 1–5', tokens: 221,
          breadcrumb: 'Политика удалённой работы › 3. Форматы присутствия › Таблица 1', finding: false, payloads: ['table'],
          display: '### 3. Форматы присутствия\n\n[Таблица: Режимы удалённой работы — `tbl_91bc2d`]',
          fulltext: '3. Форматы присутствия. Таблица содержит режимы: удалённый, гибридный и офисный; согласование руководителем; допустимое количество офисных дней.',
          vector: 'Доступные форматы работы: полностью удалённый, гибридный и офисный. Формат согласуется с руководителем, а число офисных дней определяется режимом.',
          hash: 'sha256:71de08ce…3a12', signature: 'sig:work-modes:b05e'
        },
        {
          id: 'chunk_004', ordinal: 4, type: 'image_context', coordinates: 'page 4 · figure 1', tokens: 163,
          breadcrumb: 'Политика удалённой работы › 4. Процесс согласования › Схема', finding: false, payloads: ['image'],
          display: '### 4. Процесс согласования\n\n[Изображение: Схема согласования удалённого режима — `img_726ad1`]',
          fulltext: '4. Процесс согласования. Сотрудник создаёт заявку, руководитель подтверждает формат, HR проверяет документы, после чего режим активируется.',
          vector: 'Согласование удалённой работы проходит четыре этапа: заявка сотрудника, подтверждение руководителя, проверка HR и активация режима.',
          hash: 'sha256:19be5b21…a893', signature: 'sig:approval-flow:3fc1'
        }
      ]
    };

    const tableRows = [
      { mode: 'Удалённый', office: '0', approval: 'Руководитель + HR', period: '12 месяцев' },
      { mode: 'Гибридный', office: '2', approval: 'Руководитель', period: '6 месяцев' },
      { mode: 'Офисный', office: '5', approval: 'Не требуется', period: 'Без срока' },
      { mode: 'Проектный', office: null, approval: 'Директор направления', period: 'До конца проекта' }
    ];

    const state = {
      fileId: 'policy-remote-work', chunkId: 'chunk_002', tab: 'Display', textMode: 'rendered',
      diff: false, degraded: false, fileFilter: 'all', tableSort: 'mode', tableAsc: true,
      showBoundaries: true, reviews: []
    };

    const tabs = ['Display', 'Fulltext', 'Vectortext', 'Payloads', 'Metadata', 'Diagnostics'];
    const byId = (id) => document.getElementById(id);
    const currentFile = () => files.find(file => file.id === state.fileId) || files[0];
    const currentChunks = () => chunksByFile[state.fileId] || [];
    const currentChunk = () => currentChunks().find(chunk => chunk.id === state.chunkId) || currentChunks()[0];
    const escapeHtml = (value) => String(value ?? '').replace(/[&<>"']/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[char]));
    const statusLabel = (status) => ({success:'Success',active:'Active',failed:'Failed',skipped:'Skipped'}[status] || status);

    function setHash() {
      const params = new URLSearchParams({file: state.fileId, chunk: state.chunkId || '', tab: state.tab, degraded: String(state.degraded)});
      history.replaceState(null, '', '#' + params.toString());
    }

    function renderFiles() {
      const query = byId('file-search').value.trim().toLowerCase();
      const visible = files.filter(file => {
        const searchMatch = !query || `${file.name} ${file.type}`.toLowerCase().includes(query);
        const hasReview = state.reviews.some(review => review.fileId === file.id);
        const filterMatch = state.fileFilter === 'all' ||
          (state.fileFilter === 'success' && file.status === 'success') ||
          (state.fileFilter === 'problem' && (file.findings || file.status === 'failed')) ||
          (state.fileFilter === 'comments' && hasReview);
        return searchMatch && filterMatch;
      });
      byId('files-count').textContent = `${visible.length} из ${files.length}`;
      byId('files-list').innerHTML = visible.length ? visible.map(file => {
        const reviewCount = state.reviews.filter(review => review.fileId === file.id).length;
        return `<button type="button" class="file-card ${file.id === state.fileId ? 'active' : ''}" data-file-id="${file.id}">
          <div class="file-title-row">
            <span class="file-icon">${escapeHtml(file.type)}</span>
            <span style="min-width:0;flex:1"><span class="file-name">${escapeHtml(file.name)}</span><span class="file-sub">${escapeHtml(file.pipeline)} · ${escapeHtml(file.updated)}</span></span>
            <span class="status ${file.status}">${statusLabel(file.status)}</span>
          </div>
          <span class="file-metrics"><span>${file.chunks} чанков</span><span>${file.payloads} payload</span><span>${file.diagnostics} diagnostics</span>${file.findings ? `<span class="problem">⚠ ${file.findings}</span>` : ''}${reviewCount ? `<span>✓ ${reviewCount} ревью</span>` : ''}</span>
        </button>`;
      }).join('') : '<div class="empty"><strong>Файлы не найдены</strong>Измените строку поиска или фильтр.</div>';
      document.querySelectorAll('[data-file-id]').forEach(button => button.addEventListener('click', () => selectFile(button.dataset.fileId)));
    }

    function renderFileHeader() {
      const file = currentFile();
      byId('file-header').innerHTML = `<div class="file-heading">
        <div style="min-width:0"><h1>${escapeHtml(file.name)}</h1><div class="file-path">${escapeHtml(file.path)}</div></div>
        <span class="status ${file.status}">${statusLabel(file.status)}</span>
      </div>
      <div class="run-row"><span class="section-label">Run</span><select class="run-select" aria-label="Исторический запуск">${file.runs.map(run => `<option>${escapeHtml(run)}</option>`).join('')}</select><button class="btn small" type="button" onclick="showToast('Сравнение запусков открыто в demo-режиме')">⇄ Сравнить</button><button class="btn small" type="button" onclick="showToast('Временная ссылка на источник скопирована')">↗ Источник</button></div>
      <div class="summary-strip"><div class="summary-item"><strong>${file.chunks}</strong><span>чанков</span></div><div class="summary-item"><strong>${file.payloads}</strong><span>payload</span></div><div class="summary-item"><strong>${file.diagnostics}</strong><span>diagnostics</span></div><div class="summary-item"><strong>${file.findings}</strong><span>findings</span></div></div>`;
      byId('degraded-banner').innerHTML = state.degraded ? `<div class="banner"><span>⚠</span><div><strong>SOURCE_VERSION_MISMATCH</strong>Текущий источник не совпадает с выбранным run. Persisted chunks доступны, но выводы по исходнику ограничены.</div></div>` : '';
    }

    function inlinePayloadMarkup(chunk) {
      if (chunk.payloads.includes('table')) {
        return `<div class="inline-payload"><div class="inline-payload-title"><span class="payload-tag">table</span><strong>Режимы удалённой работы</strong><span class="count head-spacer">4 строки · 4 столбца</span></div>
          <div class="inline-table-preview"><table><thead><tr><th>Режим</th><th>Дней в офисе</th><th>Согласование</th><th>Срок</th></tr></thead><tbody>${tableRows.map(row => `<tr><td>${escapeHtml(row.mode)}</td><td>${row.office === null ? '<span class="null">NULL</span>' : escapeHtml(row.office)}</td><td>${escapeHtml(row.approval)}</td><td>${escapeHtml(row.period)}</td></tr>`).join('')}</tbody></table></div>
          <div class="inline-caption"><span class="mono">tbl_91bc2d</span><span>page 3 · table 1</span><span class="head-spacer">Открыть в инспекторе →</span></div></div>`;
      }
      if (chunk.payloads.includes('image')) {
        return `<div class="inline-payload"><div class="inline-payload-title"><span class="payload-tag">image</span><strong>Схема согласования удалённого режима</strong><span class="count head-spacer">1600 × 900</span></div>
          <div class="inline-image-preview"><div class="image-preview ${state.degraded ? 'unavailable' : ''}"><span>${state.degraded ? 'Изображение недоступно · metadata сохранены' : 'Заявка → Руководитель → HR → Активация'}</span></div></div>
          <div class="inline-caption"><span class="mono">img_726ad1</span><span>image/png · 284 KB</span><span class="head-spacer">Открыть в инспекторе →</span></div></div>`;
      }
      return '';
    }

    function renderChunks() {
      const chunks = currentChunks();
      const query = byId('document-search').value.trim().toLowerCase();
      const visible = chunks.filter(chunk => !query || `${chunk.display} ${chunk.fulltext} ${chunk.breadcrumb}`.toLowerCase().includes(query));
      byId('chunks-list').innerHTML = visible.length ? visible.map(chunk => {
        const reviewCount = state.reviews.filter(review => review.chunkId === chunk.id).length;
        const displayText = chunk.payloads.length ? chunk.display.replace(/\n\n\[(Таблица|Изображение):[^\]]+\]/, '') : chunk.display;
        return `<article tabindex="0" class="document-section ${chunk.id === state.chunkId ? 'active' : ''} ${chunk.finding ? 'warning' : ''} ${state.showBoundaries ? '' : 'boundaries-hidden'}" data-chunk-id="${chunk.id}">
          <div class="document-section-marker"><span class="ordinal">#${String(chunk.ordinal).padStart(2,'0')}</span><span class="type-tag">${escapeHtml(chunk.type)}</span><span>${escapeHtml(chunk.coordinates)} · ${chunk.tokens} токенов</span>${chunk.finding ? '<span class="finding-tag">finding</span>' : ''}${reviewCount ? `<span class="review-dot">✓ ${reviewCount} ревью</span>` : ''}</div>
          <article class="prose">${markdownToSafeHtml(displayText)}</article>
          ${inlinePayloadMarkup(chunk)}
        </article>`;
      }).join('') : `<div class="empty"><strong>${chunks.length ? 'Совпадений не найдено' : statusLabel(currentFile().status) + ' run'}</strong>${chunks.length ? 'Измените запрос поиска по документу.' : 'Для этого запуска чанки недоступны. Смотрите статус и диагностику.'}</div>`;
      document.querySelectorAll('[data-chunk-id]').forEach(section => {
        section.addEventListener('click', () => selectChunk(section.dataset.chunkId));
        section.addEventListener('keydown', event => { if (event.key === 'Enter' || event.key === ' ') { event.preventDefault(); selectChunk(section.dataset.chunkId); } });
      });
    }

    function toggleBoundaries() {
      state.showBoundaries = !state.showBoundaries;
      byId('boundary-toggle').textContent = state.showBoundaries ? 'Границы: тонкие' : 'Границы: скрыты';
      renderChunks();
      showToast(state.showBoundaries ? 'Тонкие границы чанков показаны' : 'Документ показан единым потоком');
    }

    function renderTabs() {
      byId('tabs').innerHTML = tabs.map(tab => `<button type="button" role="tab" aria-selected="${tab === state.tab}" class="tab ${tab === state.tab ? 'active' : ''}" data-tab="${tab}">${tab}</button>`).join('');
      document.querySelectorAll('[data-tab]').forEach(button => button.addEventListener('click', () => {
        state.tab = button.dataset.tab;
        state.diff = false;
        renderInspector();
        setHash();
      }));
    }

    function markdownToSafeHtml(text) {
      const safe = escapeHtml(text);
      return safe
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>')
        .split(/\n\n+/).map(block => /^<(h2|h3|blockquote)/.test(block) ? block : `<p>${block.replace(/\n/g, '<br>')}</p>`).join('');
    }

    function diffMarkup(chunk) {
      return `<div class="breadcrumbs">${escapeHtml(chunk.breadcrumb)}</div><div class="diff-grid">
        <section class="diff-pane"><h4>Fulltext · persisted</h4><pre>${escapeHtml(chunk.fulltext)} <mark class="del">Ответственность определяется актом передачи.</mark></pre></section>
        <section class="diff-pane"><h4>Vectortext · retrieval</h4><pre>${escapeHtml(chunk.vector)} <mark class="add">Ответственность за оборудование фиксируется актом передачи.</mark></pre></section>
      </div><div class="quote-action">Diff демонстрационный: в production изменения рассчитываются по точным persisted strings.</div>`;
    }

    function textContentMarkup(chunk, key) {
      const text = chunk[key];
      const body = state.textMode === 'raw' ? `<pre class="raw-text">${escapeHtml(text)}</pre>` : `<article class="prose">${markdownToSafeHtml(text)}</article>`;
      return `<div class="breadcrumbs">${escapeHtml(chunk.breadcrumb)}</div>${body}
        <div class="detail-grid"><div class="detail"><span>Text hash</span><strong>${escapeHtml(chunk.hash)}</strong></div><div class="detail"><span>Content signature</span><strong>${escapeHtml(chunk.signature)}</strong></div><div class="detail"><span>Coordinates</span><strong>${escapeHtml(chunk.coordinates)}</strong></div><div class="detail"><span>Budget</span><strong>${chunk.tokens} / 768 target tokens</strong></div></div>
        <div class="quote-action">Выделите фрагмент в production-интерфейсе или нажмите «Комментарий», чтобы привязать цитату к <span class="mono">${chunk.id}</span>.</div>`;
    }

    function payloadMarkup(chunk) {
      if (!chunk.payloads.length) return '<div class="empty"><strong>Payload отсутствуют</strong>Этот чанк содержит только текстовые представления.</div>';
      const table = chunk.payloads.includes('table') ? `<section class="payload-card"><div class="payload-card-head"><span class="payload-tag">table</span><strong>Режимы удалённой работы</strong><span class="count head-spacer">tbl_91bc2d · 4 × 4</span></div><div class="payload-card-body"><p class="payload-summary">Сохранённая таблица описывает допустимые форматы присутствия, число офисных дней, согласование и срок действия.</p><div class="table-wrap"><table><thead><tr><th data-table-sort="mode">Режим ↕</th><th data-table-sort="office">Дней в офисе ↕</th><th data-table-sort="approval">Согласование ↕</th><th data-table-sort="period">Срок ↕</th></tr></thead><tbody id="payload-table-body"></tbody></table></div><div class="file-metrics"><span>schema: lore_toast</span><span>profile: complete</span><span>occurrences: 1</span></div></div></section>` : '';
      const image = chunk.payloads.includes('image') ? `<section class="payload-card"><div class="payload-card-head"><span class="payload-tag">image</span><strong>Схема согласования режима</strong><span class="count head-spacer">img_726ad1</span></div><div class="payload-card-body"><div class="image-preview ${state.degraded ? 'unavailable' : ''}"><span>${state.degraded ? 'Объект недоступен · metadata сохранены' : 'Preview · 1600 × 900'}</span></div><p class="payload-summary">Схема из четырёх этапов: заявка сотрудника, руководитель, проверка HR, активация удалённого режима.</p><div class="file-metrics"><span>image/png</span><span>284 KB</span><span class="mono">sha256:76a01…4be</span></div></div></section>` : '';
      return table + image;
    }

    function metadataMarkup(chunk) {
      const data = {chunk_id: chunk.id, ordinal: chunk.ordinal, chunk_type: chunk.type, coordinates: chunk.coordinates, breadcrumb: chunk.breadcrumb, content_signature: chunk.signature, text_hash: chunk.hash, payload_refs: chunk.payloads, source_hash_state: state.degraded ? 'mismatch' : 'match'};
      return `<div class="breadcrumbs">Versioned DTO preview · read only</div><pre class="raw-text">${escapeHtml(JSON.stringify(data, null, 2))}</pre>`;
    }

    function diagnosticsMarkup(chunk) {
      return `<div class="diagnostic info"><span>✓</span><div><strong>AUDIT_COMPLETED</strong><p><code>audit/v1</code> · 18 правил проверено · run consistency подтверждена.</p></div></div>
        ${chunk.finding ? '<div class="diagnostic warning"><span>⚠</span><div><strong>CHUNK_BOUNDARY_CONTEXT</strong><p>Граница после требования VPN может отделять связанное условие об ответственности за оборудование. Требуется семантическое ревью.</p></div></div>' : ''}
        ${state.degraded ? '<div class="diagnostic warning"><span>⚠</span><div><strong>SOURCE_VERSION_MISMATCH</strong><p>Current source hash не совпадает с source hash выбранного run. Source-based выводы заблокированы.</p></div></div>' : ''}
        <div class="diagnostic info"><span>i</span><div><strong>PROCESSING_REFERENCE_RESOLVED</strong><p>Все зарегистрированные payload references доступны через bounded read API.</p></div></div>`;
    }

    function renderInspector() {
      renderTabs();
      const chunk = currentChunk();
      const file = currentFile();
      if (!chunk) {
        byId('inspector-title').textContent = `${statusLabel(file.status)} run`;
        byId('inspector-coordinates').textContent = file.run;
        byId('inspector-content').innerHTML = `<div class="empty"><strong>Нет доступных чанков</strong>Обработка ещё не завершена или закончилась без chunk output. Диагностика запуска остаётся доступной.</div>`;
        byId('text-stats').textContent = '';
        return;
      }
      byId('inspector-title').textContent = `Чанк #${String(chunk.ordinal).padStart(2,'0')} · ${chunk.type}`;
      byId('inspector-coordinates').textContent = `${chunk.id} · ${chunk.coordinates}`;
      const tabToKey = {Display:'display', Fulltext:'fulltext', Vectortext:'vector'};
      let markup;
      if (state.diff) markup = diffMarkup(chunk);
      else if (tabToKey[state.tab]) markup = textContentMarkup(chunk, tabToKey[state.tab]);
      else if (state.tab === 'Payloads') markup = payloadMarkup(chunk);
      else if (state.tab === 'Metadata') markup = metadataMarkup(chunk);
      else markup = diagnosticsMarkup(chunk);
      byId('inspector-content').innerHTML = markup;
      const currentText = tabToKey[state.tab] ? chunk[tabToKey[state.tab]] : '';
      byId('text-stats').textContent = currentText ? `${currentText.length} символов · ${chunk.tokens} токенов` : '';
      byId('diff-button').classList.toggle('primary', state.diff);
      document.querySelectorAll('[data-table-sort]').forEach(header => header.addEventListener('click', () => sortTable(header.dataset.tableSort)));
      renderTableRows();
    }

    function renderTableRows() {
      const body = byId('payload-table-body');
      if (!body) return;
      const rows = [...tableRows].sort((a,b) => String(a[state.tableSort] ?? '').localeCompare(String(b[state.tableSort] ?? ''), 'ru') * (state.tableAsc ? 1 : -1));
      body.innerHTML = rows.map(row => `<tr><td>${escapeHtml(row.mode)}</td><td>${row.office === null ? '<span class="null">NULL</span>' : escapeHtml(row.office)}</td><td>${escapeHtml(row.approval)}</td><td>${escapeHtml(row.period)}</td></tr>`).join('');
    }

    function sortTable(key) {
      if (state.tableSort === key) state.tableAsc = !state.tableAsc;
      else { state.tableSort = key; state.tableAsc = true; }
      renderTableRows();
      showToast(`Таблица отсортирована: ${key} ${state.tableAsc ? '↑' : '↓'}`);
    }

    function selectFile(fileId) {
      state.fileId = fileId;
      const chunks = currentChunks();
      state.chunkId = chunks[0]?.id || '';
      state.tab = chunks.length ? 'Display' : 'Diagnostics';
      state.diff = false;
      renderAll();
      setHash();
      activateMobilePanel('chunks-panel');
    }

    function selectChunk(chunkId) {
      state.chunkId = chunkId;
      state.diff = false;
      document.querySelectorAll('.document-section').forEach(section => section.classList.toggle('active', section.dataset.chunkId === chunkId));
      renderInspector();
      setHash();
      const selected = document.querySelector(`[data-chunk-id="${chunkId}"]`);
      if (selected && !selected.matches(':hover')) selected.scrollIntoView({block:'nearest', behavior:'smooth'});
      activateMobilePanel('inspector-panel');
    }

    function toggleDiff() {
      if (!currentChunk()) return;
      state.diff = !state.diff;
      if (state.diff && !['Display','Fulltext','Vectortext'].includes(state.tab)) state.tab = 'Fulltext';
      renderInspector();
      showToast(state.diff ? 'Diff Fulltext ↔ Vectortext' : 'Обычный просмотр');
    }

    function toggleDegraded() {
      state.degraded = !state.degraded;
      byId('degraded-toggle').textContent = state.degraded ? '● Normal demo' : '◐ Degraded demo';
      renderFileHeader();
      renderChunks();
      renderInspector();
      setHash();
      showToast(state.degraded ? 'Degraded-состояние включено' : 'Обычное состояние восстановлено');
    }

    function prefillQuote() {
      const chunk = currentChunk();
      if (!chunk) return;
      byId('review-quote').value = chunk.display.replace(/[#>\n]/g,' ').replace(/\s+/g,' ').trim().slice(0, 120);
      toggleReviewDrawer(true);
      byId('review-comment').focus();
    }

    function addReview() {
      const chunk = currentChunk();
      const comment = byId('review-comment').value.trim();
      if (!chunk) return showToast('Сначала выберите чанк');
      if (!comment) { byId('review-comment').focus(); return showToast('Добавьте текст комментария'); }
      state.reviews.unshift({
        id: `review_${Date.now()}`, fileId: state.fileId, chunkId: chunk.id, signature: chunk.signature,
        verdict: byId('review-verdict').value, category: byId('review-category').value,
        quote: byId('review-quote').value.trim(), comment, reviewer: 'Никита', provenance: 'human',
        status: 'open', created: new Date().toLocaleString('ru-RU')
      });
      byId('review-comment').value = '';
      byId('review-quote').value = '';
      renderReviews();
      renderFiles();
      renderChunks();
      showToast('Комментарий сохранён локально');
    }

    function renderReviews() {
      const count = state.reviews.length;
      byId('review-count-top').textContent = count;
      byId('review-count-drawer').textContent = `${count} ${count === 1 ? 'запись' : 'записей'}`;
      byId('review-items').innerHTML = count ? state.reviews.map(review => `<article class="review-item ${review.status === 'reviewed' ? 'reviewed' : ''}">
        <div class="review-top"><span class="verdict ${review.verdict}">${review.verdict}</span><strong style="font-size:11px">${escapeHtml(review.category)}</strong><span class="provenance head-spacer">${review.provenance}</span></div>
        ${review.quote ? `<blockquote>“${escapeHtml(review.quote)}”</blockquote>` : ''}<p>${escapeHtml(review.comment)}</p>
        <div class="review-meta">${escapeHtml(review.chunkId)} · ${escapeHtml(review.reviewer)} · ${escapeHtml(review.created)}</div>
        <div class="review-actions"><button class="btn small" type="button" onclick="toggleReviewStatus('${review.id}')">${review.status === 'open' ? 'Отметить просмотренным' : 'Вернуть в open'}</button><button class="btn danger small" type="button" onclick="deleteReview('${review.id}')">Удалить</button></div>
      </article>`).join('') : '<div class="empty"><strong>Комментариев пока нет</strong>Оставьте ревью к выбранному чанку или импортируйте AI finding.</div>';
    }

    function toggleReviewStatus(id) {
      const review = state.reviews.find(item => item.id === id);
      if (review) review.status = review.status === 'open' ? 'reviewed' : 'open';
      renderReviews(); renderChunks(); showToast('Статус ревью обновлён');
    }

    function deleteReview(id) {
      state.reviews = state.reviews.filter(item => item.id !== id);
      renderReviews(); renderFiles(); renderChunks(); showToast('Комментарий удалён');
    }

    function clearReviews() {
      state.reviews = [];
      renderReviews(); renderFiles(); renderChunks(); showToast('Локальные ревью очищены');
    }

    function importAgentFinding() {
      const chunk = currentChunk() || chunksByFile['policy-remote-work'][1];
      const existing = state.reviews.some(review => review.id === 'agent_finding_demo');
      if (existing) return showToast('Finding уже импортирован · дедупликация по ID');
      state.reviews.unshift({
        id: 'agent_finding_demo', fileId: state.fileId, chunkId: chunk.id, signature: chunk.signature,
        verdict: 'question', category: 'Граница чанка', quote: 'Доступ к внутренним системам осуществляется только через корпоративный VPN.',
        comment: 'Проверьте, не потеряна ли связь со следующим условием об ответственности за оборудование.',
        reviewer: 'audit-lore-splitter', provenance: 'agent', status: 'open', created: new Date().toLocaleString('ru-RU')
      });
      renderReviews(); renderFiles(); renderChunks(); showToast('AI finding импортирован');
    }

    function exportReviews() {
      const bundle = {schema_version:'lore/review/v1', exported_at:new Date().toISOString(), environment:'internal-demo', reviews:state.reviews};
      const blob = new Blob([JSON.stringify(bundle, null, 2)], {type:'application/json'});
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'lore-file-review-demo.json';
      link.click();
      URL.revokeObjectURL(link.href);
      showToast(`Экспортировано: ${state.reviews.length} записей`);
    }

    function toggleReviewDrawer(open) {
      byId('review-drawer').classList.toggle('open', open);
      byId('review-drawer').setAttribute('aria-hidden', String(!open));
    }

    function copyCurrentText() {
      const chunk = currentChunk();
      if (!chunk) return;
      const key = {Display:'display',Fulltext:'fulltext',Vectortext:'vector'}[state.tab] || 'display';
      if (navigator.clipboard) navigator.clipboard.writeText(chunk[key]);
      showToast(`${state.tab} скопирован`);
    }

    let toastTimer;
    function showToast(message) {
      const toast = byId('toast');
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
    }

    function activateMobilePanel(className) {
      if (!matchMedia('(max-width: 760px)').matches) return;
      document.querySelectorAll('.workspace > .panel').forEach(panel => panel.classList.toggle('mobile-active', panel.classList.contains(className)));
      document.querySelectorAll('[data-mobile-panel]').forEach(button => button.classList.toggle('active', button.dataset.mobilePanel === className));
    }

    function renderAll() {
      renderFiles();
      renderFileHeader();
      renderChunks();
      renderInspector();
      renderReviews();
    }

    byId('file-search').addEventListener('input', renderFiles);
    byId('document-search').addEventListener('input', renderChunks);
    document.querySelectorAll('[data-status-filter]').forEach(button => button.addEventListener('click', () => {
      state.fileFilter = button.dataset.statusFilter;
      document.querySelectorAll('[data-status-filter]').forEach(item => item.classList.toggle('active', item === button));
      renderFiles();
    }));
    document.querySelectorAll('[data-text-mode]').forEach(button => button.addEventListener('click', () => {
      state.textMode = button.dataset.textMode;
      document.querySelectorAll('[data-text-mode]').forEach(item => item.classList.toggle('active', item === button));
      renderInspector();
    }));
    document.querySelectorAll('[data-mobile-panel]').forEach(button => button.addEventListener('click', () => activateMobilePanel(button.dataset.mobilePanel)));
    document.addEventListener('keydown', event => {
      const tag = document.activeElement?.tagName;
      if (['INPUT','TEXTAREA','SELECT'].includes(tag)) return;
      const chunks = currentChunks();
      const index = chunks.findIndex(chunk => chunk.id === state.chunkId);
      if ((event.key === 'j' || event.key === 'ArrowDown') && index < chunks.length - 1) { event.preventDefault(); selectChunk(chunks[index + 1].id); }
      if ((event.key === 'k' || event.key === 'ArrowUp') && index > 0) { event.preventDefault(); selectChunk(chunks[index - 1].id); }
      if (event.key === 'Escape') toggleReviewDrawer(false);
    });

    renderAll();
    setHash();
  </script>
</body>
</html>
